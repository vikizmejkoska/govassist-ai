spring.application.name=govassist-ai

# PostgreSQL defaults for local development
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8081}

# Swagger disabled
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Upload configuration
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}

# JWT configuration for local development
app.jwt.secret=${JWT_SECRET:govassist-dev-secret-key-change-this-in-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
